<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Provider Dashboard | Med-Drive</title>
    <style>
        :root {
            --dark-bg: #0d1117;
            --sidebar-bg: #010409;
            --card-bg: #161b22;
            --accent-red: #f85149;
            --accent-blue: #58a6ff;
            --text-gray: #8b949e;
            --white: #ffffff;
            --border: #30363d;
            --success: #3fb950;
        }

        body { 
            margin: 0; font-family: 'Segoe UI', sans-serif; 
            background: var(--dark-bg); color: var(--white); 
            display: flex; height: 100vh; overflow: hidden;
        }

        /* Sidebar */
        .sidebar { width: 280px; background: var(--sidebar-bg); border-right: 1px solid var(--border); padding: 25px; display: flex; flex-direction: column; }
        
        .logo-area { display: flex; flex-direction: column; align-items: center; padding: 10px 0 30px 0; border-bottom: 1px solid var(--border); margin-bottom: 20px; }
        .main-logo { width: 70px; height: auto; filter: drop-shadow(0 0 8px rgba(248, 81, 73, 0.3)); margin-bottom: 10px; }
        .logo-text { color: var(--accent-red); font-size: 18px; letter-spacing: 2px; font-weight: 800; margin: 0; }

        /* Main Content */
        .main { flex: 1; padding: 40px; overflow-y: auto; }

        /* Stats Section */
        .stats-container { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin-bottom: 40px; }
        .stat-card { 
            background: var(--card-bg); padding: 25px; border-radius: 12px; 
            border: 1px solid var(--border); border-top: 4px solid var(--accent-blue);
        }
        .stat-card small { color: var(--text-gray); font-size: 12px; text-transform: uppercase; }
        .stat-card h2 { margin: 10px 0 0 0; font-size: 32px; }

        /* Form */
        .action-card { background: var(--card-bg); padding: 30px; border-radius: 12px; border: 1px solid var(--border); margin-bottom: 30px; }
        .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px; }
        input, select { width: 100%; padding: 12px; background: var(--dark-bg); border: 1px solid var(--border); border-radius: 6px; color: white; outline: none; }
        
        .btn-submit { background: var(--accent-blue); color: white; border: none; padding: 14px; border-radius: 6px; font-weight: bold; cursor: pointer; width: 100%; }

        /* Fleet Items */
        .fleet-item { 
            background: var(--card-bg); border: 1px solid var(--border); padding: 15px 20px; 
            border-radius: 10px; margin-bottom: 12px; display: flex; justify-content: space-between; align-items: center;
        }
        .badge { padding: 4px 10px; border-radius: 20px; font-size: 11px; font-weight: bold; }
        .status-available { background: rgba(63, 185, 80, 0.15); color: var(--success); }
    </style>
</head>
<body>

    <aside class="sidebar">
        <div class="logo-area">
            <img src="../assets/images/logo.png" alt="Logo" class="main-logo" onerror="this.src='https://via.placeholder.com/70/f85149/ffffff?text=MD'">
            <h3 class="logo-text">MED-DRIVE</h3>
        </div>
        
        <div style="margin-bottom: 30px;">
            <p id="provider-name-display" style="margin:0; font-weight: bold; font-size: 18px;">Loading...</p>
            <small id="display-provider-id" style="color: var(--text-gray);">ID: ---</small>
        </div>
        
        <nav style="flex-grow: 1;">
            <div style="color: var(--accent-blue); margin-bottom: 15px; font-weight: bold;">📊 Dashboard</div>
            <div style="color: var(--text-gray); margin-bottom: 15px; cursor: pointer;">🚑 My Fleet</div>
            <div style="color: var(--text-gray); margin-bottom: 15px; cursor: pointer;">📋 Bookings</div>
        </nav>

        <button onclick="logout()" style="background: none; border: 1px solid var(--border); color: var(--text-gray); padding: 10px; border-radius: 8px; cursor: pointer;">Logout</button>
    </aside>

    <main class="main">
        <header style="margin-bottom: 40px;">
            <h1 id="header-company-name">Welcome</h1>
            <p style="color: var(--text-gray);">License: <span id="display-license" style="color: var(--white);">---</span></p>
        </header>

        <section class="stats-container">
            <div class="stat-card">
                <small>Total Vehicles</small>
                <h2 id="total-count">0</h2>
            </div>
            <div class="stat-card">
                <small>Available Now</small>
                <h2 id="avail-count" style="color: var(--success);">0</h2>
            </div>
            <div class="stat-card">
                <small>Potential Revenue</small>
                <h2 id="total-revenue">৳ 0</h2>
            </div>
        </section>

        <section class="action-card">
            <h3 style="margin-top: 0; color: var(--accent-red);">+ Register New Vehicle</h3>
            <div class="form-row">
                <input type="text" id="v-plate" placeholder="License Plate (e.g. DHAKA-METRO-123)">
                <select id="v-type">
                    <option value="AC Ambulance">AC Ambulance</option>
                    <option value="Non-AC Ambulance">Non-AC Ambulance</option>
                    <option value="ICU Support">ICU Support</option>
                </select>
            </div>
            <div class="form-row">
                <input type="text" id="v-driver" placeholder="Driver Name">
                <input type="number" id="v-fare" placeholder="Base Fare (৳)">
            </div>
            <button class="btn-submit" onclick="addVehicle()">DEPLOY TO FLEET</button>
        </section>

        <h3>Fleet Management</h3>
        <div id="fleet-list">
            </div>
    </main>

    <script>
        const API_BASE = 'https://med-drive-ambulance-app.onrender.com/api';

        // --- THE MISSING WINDOW.ONLOAD ADDED HERE ---
        window.onload = () => {
            const company = sessionStorage.getItem('companyName') || 'Authorized Provider';
            const pId = sessionStorage.getItem('providerId') || 'N/A';
            const license = sessionStorage.getItem('tradeLicense') || 'Pending';

            // Display Profile Data
            document.getElementById('provider-name-display').innerText = company;
            document.getElementById('header-company-name').innerText = company;
            document.getElementById('display-provider-id').innerText = `ID: ${pId}`;
            document.getElementById('display-license').innerText = license;

            loadProviderFleet();
        };

        async function loadProviderFleet() {
            const pId = sessionStorage.getItem('providerId');
            try {
                // Fetching all ambulances and filtering by this provider's ID
                const res = await fetch(`${API_BASE}/ambulances`);
                const allAmbs = await res.json();
                const myFleet = allAmbs.filter(a => a.provider_id == pId);

                // Update Stats
                document.getElementById('total-count').innerText = myFleet.length;
                document.getElementById('avail-count').innerText = myFleet.filter(a => a.status === 'Available').length;

                // --- EARNINGS CALCULATOR ADDED HERE ---
                const totalRev = myFleet.reduce((sum, amb) => sum + (parseInt(amb.base_fare) || 0), 0);
                document.getElementById('total-revenue').innerText = `৳ ${totalRev.toLocaleString()}`;

                // Update List
                const list = document.getElementById('fleet-list');
                list.innerHTML = myFleet.map(amb => `
                    <div class="fleet-item">
                        <div>
                            <div style="font-weight: bold;">${amb.vehicle_number}</div>
                            <small style="color: var(--text-gray);">${amb.ambulance_type} | Driver: ${amb.driver_name}</small>
                        </div>
                        <div style="text-align: right;">
                            <span class="badge status-available">${amb.status}</span>
                            <div style="margin-top: 5px; font-weight: bold;">৳ ${amb.base_fare}</div>
                            <button onclick="deleteVehicle(${amb.id})" style="background:none; border:none; color:var(--accent-red); cursor:pointer; font-size:11px;">Remove</button>
                        </div>
                    </div>
                `).join('') || '<p style="color: gray; text-align: center; padding: 20px;">No vehicles found.</p>';

            } catch (err) { console.error("Load Error:", err); }
        }

        async function addVehicle() {
            const data = {
                vehicle_number: document.getElementById('v-plate').value,
                ambulance_type: document.getElementById('v-type').value,
                driver_name: document.getElementById('v-driver').value,
                base_fare: document.getElementById('v-fare').value,
                provider_id: sessionStorage.getItem('providerId'),
                status: 'Available'
            };

            if(!data.vehicle_number || !data.driver_name || !data.base_fare) return alert("Please fill all fields.");

            try {
                const res = await fetch(`${API_BASE}/ambulances`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });
                if(res.ok) {
                    alert("Vehicle Added!");
                    loadProviderFleet();
                    document.querySelectorAll('input').forEach(i => i.value = '');
                }
            } catch (err) { alert("Error connecting to server."); }
        }

        async function deleteVehicle(id) {
            if(!confirm("Remove this vehicle?")) return;
            await fetch(`${API_BASE}/ambulances/${id}`, { method: 'DELETE' });
            loadProviderFleet();
        }

        function logout() { sessionStorage.clear(); window.location.href = '../index.html'; }
    </script>
</body>
</html>
