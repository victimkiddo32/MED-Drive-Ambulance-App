<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Provider Dashboard | Med-Drive</title>
    <style>
        :root {
            --dark-bg: #0d1117;
            --sidebar-bg: #010409;
            --card-bg: #161b22;
            --accent-red: #f85149;
            --accent-blue: #58a6ff;
            --text-gray: #8b949e;
            --white: #ffffff;
            --border: #30363d;
            --success: #3fb950;
        }

        body { 
            margin: 0; font-family: 'Segoe UI', sans-serif; 
            background: var(--dark-bg); color: var(--white); 
            display: flex; height: 100vh; overflow: hidden;
        }

        /* Sidebar */
        .sidebar { 
            width: 280px; background: var(--sidebar-bg); 
            border-right: 1px solid var(--border); padding: 25px; 
            display: flex; flex-direction: column; 
        }
        .logo { color: var(--accent-red); font-size: 22px; font-weight: bold; margin-bottom: 40px; display: flex; align-items: center; gap: 10px; }
        
        .nav-menu { list-style: none; padding: 0; margin: 0; flex-grow: 1; }
        .nav-item { 
            padding: 12px 15px; border-radius: 8px; margin-bottom: 8px; 
            cursor: pointer; color: var(--text-gray); transition: 0.2s;
            display: flex; align-items: center; gap: 12px;
        }
        .nav-item:hover, .nav-item.active { background: rgba(88, 166, 255, 0.1); color: var(--accent-blue); }

        /* Main Content */
        .main { flex: 1; padding: 40px; overflow-y: auto; }

        /* Dashboard Stats */
        .stats-container { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin-bottom: 40px; }
        .stat-card { 
            background: var(--card-bg); padding: 25px; border-radius: 12px; 
            border: 1px solid var(--border); border-top: 4px solid var(--accent-blue);
        }
        .stat-card small { color: var(--text-gray); font-size: 12px; text-transform: uppercase; letter-spacing: 1px; }
        .stat-card h2 { margin: 10px 0 0 0; font-size: 32px; }

        /* Registration Form */
        .action-card { 
            background: var(--card-bg); padding: 30px; border-radius: 12px; 
            border: 1px solid var(--border); margin-bottom: 30px; 
        }
        .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px; }
        .form-group label { display: block; color: var(--text-gray); font-size: 13px; margin-bottom: 8px; }
        input, select { 
            width: 100%; padding: 12px; background: var(--dark-bg); border: 1px solid var(--border); 
            border-radius: 6px; color: white; box-sizing: border-box; outline: none;
        }
        input:focus { border-color: var(--accent-blue); }

        .btn-submit { 
            background: var(--accent-blue); color: white; border: none; 
            padding: 14px; border-radius: 6px; font-weight: bold; 
            cursor: pointer; width: 100%; transition: 0.3s;
        }
        .btn-submit:hover { opacity: 0.9; transform: translateY(-1px); }

        /* Fleet List */
        .fleet-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .fleet-item { 
            background: var(--card-bg); border: 1px solid var(--border); 
            padding: 15px 20px; border-radius: 10px; margin-bottom: 12px;
            display: flex; justify-content: space-between; align-items: center;
        }
        .status-badge { 
            padding: 4px 10px; border-radius: 20px; font-size: 11px; font-weight: bold; 
        }
        .status-available { background: rgba(63, 185, 80, 0.15); color: var(--success); }
        .status-busy { background: rgba(248, 81, 73, 0.15); color: var(--accent-red); }
    </style>
</head>
<body>

    <aside class="sidebar">
        <div class="logo">🚑 Med-Drive</div>
        <div style="margin-bottom: 30px;">
            <p id="provider-name" style="margin:0; font-weight: bold;">Provider Admin</p>
            <small style="color: var(--text-gray);">Fleet Management Panel</small>
        </div>
        
        <nav class="nav-menu">
            <div class="nav-item active">📊 Dashboard Overview</div>
            <div class="nav-item">🚑 My Ambulances</div>
            <div class="nav-item">📅 Booking History</div>
            <div class="nav-item">💰 Earnings</div>
        </nav>

        <div class="nav-item" onclick="logout()" style="margin-top: auto; border-top: 1px solid var(--border); padding-top: 15px;">
            🚪 Sign Out
        </div>
    </aside>

    <main class="main">
        <header style="margin-bottom: 40px;">
            <h1 style="margin: 0;">Fleet Console</h1>
            <p style="color: var(--text-gray);">Welcome back. Here is your fleet's current status.</p>
        </header>

        <section class="stats-container">
            <div class="stat-card">
                <small>Active Fleet</small>
                <h2 id="total-count">0</h2>
            </div>
            <div class="stat-card">
                <small>Available Now</small>
                <h2 id="avail-count" style="color: var(--success);">0</h2>
            </div>
            <div class="stat-card">
                <small>Today's Revenue</small>
                <h2 id="revenue-count">৳ 0</h2>
            </div>
        </section>

        <section class="action-card">
            <h3 style="margin-top: 0; margin-bottom: 20px;">+ Register New Vehicle</h3>
            <div class="form-row">
                <div class="form-group">
                    <label>Vehicle License Plate</label>
                    <input type="text" id="v-plate" placeholder="e.g. DHAKA-METRO-KA-1234">
                </div>
                <div class="form-group">
                    <label>Ambulance Category</label>
                    <select id="v-type">
                        <option value="AC Ambulance">AC Ambulance</option>
                        <option value="Non-AC Ambulance">Non-AC Ambulance</option>
                        <option value="ICU Support">ICU Support</option>
                        <option value="Freezer Van">Freezer Van</option>
                    </select>
                </div>
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label>Assign Driver Name</label>
                    <input type="text" id="v-driver" placeholder="Full name of driver">
                </div>
                <div class="form-group">
                    <label>Base Fare (৳)</label>
                    <input type="number" id="v-fare" placeholder="1500">
                </div>
            </div>
            <button class="btn-submit" onclick="addVehicle()">DEPLOY TO FLEET</button>
        </section>

        <div class="fleet-header">
            <h3>Current Inventory</h3>
            <button onclick="fetchFleet()" style="background:none; border:1px solid var(--border); color:white; padding:5px 10px; border-radius:5px; cursor:pointer;">🔄 Refresh</button>
        </div>
        <div id="fleet-list">
            </div>
    </main>

    <script>
        const API_BASE = 'https://med-drive-ambulance-app.onrender.com/api';

        window.onload = () => {
            const user = sessionStorage.getItem('userName');
            if(user) document.getElementById('provider-name').innerText = user;
            fetchFleet();
        };

        async function fetchFleet() {
            const providerName = sessionStorage.getItem('userName') || 'Provider';
            try {
                const response = await fetch(`${API_BASE}/ambulances`);
                const allData = await response.json();
                
                // Filter data for this specific provider
                const myFleet = allData.filter(item => item.provider === providerName);

                document.getElementById('total-count').innerText = myFleet.length;
                document.getElementById('avail-count').innerText = myFleet.filter(a => a.status === 'Available').length;

                const listDiv = document.getElementById('fleet-list');
                if(myFleet.length === 0) {
                    listDiv.innerHTML = `<p style="text-align:center; color:var(--text-gray); padding:20px;">No vehicles found. Register your first ambulance above.</p>`;
                    return;
                }

                listDiv.innerHTML = myFleet.map(amb => `
                    <div class="fleet-item">
                        <div>
                            <div style="font-weight: bold; font-size: 16px;">${amb.vehicle_number}</div>
                            <div style="font-size: 13px; color: var(--text-gray);">${amb.ambulance_type} | Driver: ${amb.driver_name}</div>
                        </div>
                        <div style="text-align: right;">
                            <span class="status-badge ${amb.status === 'Available' ? 'status-available' : 'status-busy'}">
                                ${amb.status.toUpperCase()}
                            </span>
                            <div style="margin-top: 5px; font-weight: bold;">৳ ${amb.base_fare || 1500}</div>
                        </div>
                    </div>
                `).join('');

            } catch (err) {
                console.error("Fetch Error:", err);
            }
        }

        async function addVehicle() {
    // Get the provider_id from session (This should be 60001, 60002, etc.)
    const pId = sessionStorage.getItem('providerId'); 

    const data = {
        vehicle_number: document.getElementById('v-plate').value,
        ambulance_type: document.getElementById('v-type').value,
        driver_name: document.getElementById('v-driver').value,
        base_fare: document.getElementById('v-fare').value,
        provider_id: pId, // LINKING TO YOUR TABLE
        status: 'Available'
    };

    if(!pId) return alert("Error: Provider session expired. Please login again.");

    try {
        const res = await fetch(`${API_BASE}/ambulances`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(data)
        });

        if(res.ok) {
            alert("Vehicle added to your organization's fleet!");
            fetchFleet(); 
        }
    } catch (err) {
        alert("Server connection failed.");
    }
}
        function logout() {
            sessionStorage.clear();
            window.location.href = '../index.html';
        }
    </script>
</body>
</html>
