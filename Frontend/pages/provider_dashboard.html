<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Provider Dashboard | Med-Drive</title>
    <style>
        :root {
            --dark-bg: #0d1117;
            --sidebar-bg: #010409;
            --card-bg: #161b22;
            --accent-red: #f85149;
            --accent-blue: #58a6ff;
            --text-gray: #8b949e;
            --white: #ffffff;
            --border: #30363d;
            --success: #3fb950;
        }

        body { 
            margin: 0; font-family: 'Segoe UI', sans-serif; 
            background: var(--dark-bg); color: var(--white); 
            display: flex; height: 100vh; overflow: hidden;
        }

        /* Sidebar Styling - Your Specific Style */
        .sidebar {
            width: 260px;
            background: var(--sidebar-bg);
            display: flex;
            flex-direction: column;
            padding: 20px;
            border-right: 1px solid var(--border);
        }

        .logo-area {
            text-align: center;
            margin-bottom: 30px;
        }

        .logo-area img {
            width: 70px;
            height: 70px;
            border-radius: 50%;
            border: 2px solid var(--accent-red);
            object-fit: cover;
        }

        .nav-menu { list-style: none; padding: 0; margin: 0; flex-grow: 1; }
        .nav-item { 
            padding: 12px 15px; border-radius: 8px; margin-bottom: 8px; 
            cursor: pointer; color: var(--text-gray); transition: 0.2s;
            display: flex; align-items: center; gap: 12px;
        }
        .nav-item:hover, .nav-item.active { background: rgba(88, 166, 255, 0.1); color: var(--accent-blue); }

        /* Main Content */
        .main { flex: 1; padding: 40px; overflow-y: auto; }

        /* Dashboard Stats */
        .stats-container { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin-bottom: 40px; }
        .stat-card { 
            background: var(--card-bg); padding: 25px; border-radius: 12px; 
            border: 1px solid var(--border); border-top: 4px solid var(--accent-blue);
        }
        .stat-card small { color: var(--text-gray); font-size: 12px; text-transform: uppercase; letter-spacing: 1px; }
        .stat-card h2 { margin: 10px 0 0 0; font-size: 32px; }

        /* Registration Form */
        .action-card { background: var(--card-bg); padding: 30px; border-radius: 12px; border: 1px solid var(--border); margin-bottom: 30px; }
        .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px; }
        .form-group label { display: block; color: var(--text-gray); font-size: 13px; margin-bottom: 8px; }
        input, select { 
            width: 100%; padding: 12px; background: var(--dark-bg); border: 1px solid var(--border); 
            border-radius: 6px; color: white; box-sizing: border-box; outline: none;
        }

        .btn-submit { 
            background: var(--accent-blue); color: white; border: none; 
            padding: 14px; border-radius: 6px; font-weight: bold; cursor: pointer; width: 100%; 
        }

        /* Fleet List */
        .fleet-item { 
            background: var(--card-bg); border: 1px solid var(--border); 
            padding: 15px 20px; border-radius: 10px; margin-bottom: 12px;
            display: flex; justify-content: space-between; align-items: center;
        }
        .status-badge { padding: 4px 10px; border-radius: 20px; font-size: 11px; font-weight: bold; }
        .status-available { background: rgba(63, 185, 80, 0.15); color: var(--success); }
    </style>
</head>
<body>

    <aside class="sidebar">
        <div class="logo-area">
            <img src="../assets/images/logo.png" alt="Logo" onerror="this.src='https://via.placeholder.com/70/f85149/ffffff?text=MD'">
            <h3 style="color: var(--accent-red); margin-top: 10px; font-size: 16px;">MED-DRIVE</h3>
        </div>

        <div style="margin-bottom: 30px; text-align: center;">
            <p id="provider-name" style="margin:0; font-weight: bold;">Provider Admin</p>
            <small style="color: var(--text-gray);">Fleet Console</small>
        </div>
        
        <nav class="nav-menu">
            <div class="nav-item active">📊 Overview</div>
            <div class="nav-item">🚑 My Fleet</div>
            <div class="nav-item">💰 Earnings</div>
        </nav>

        <div class="nav-item" onclick="logout()" style="margin-top: auto; border-top: 1px solid var(--border); padding-top: 15px;">
            🚪 Sign Out
        </div>
    </aside>

    <main class="main">
        <header style="margin-bottom: 40px;">
            <h1 style="margin: 0;">Fleet Dashboard</h1>
            <p style="color: var(--text-gray);">Managing assets for: <span id="company-display" style="color:white">...</span></p>
        </header>

        <section class="stats-container">
            <div class="stat-card">
                <small>Total Vehicles</small>
                <h2 id="total-count">0</h2>
            </div>
            <div class="stat-card">
                <small>Available Now</small>
                <h2 id="avail-count" style="color: var(--success);">0</h2>
            </div>
            <div class="stat-card">
                <small>Potential Revenue</small>
                <h2 id="revenue-count">৳ 0</h2>
            </div>
        </section>

        <section class="action-card">
            <h3 style="margin-top: 0; margin-bottom: 20px;">+ Register New Vehicle</h3>
            <div class="form-row">
                <div class="form-group">
                    <label>Vehicle License Plate</label>
                    <input type="text" id="v-plate" placeholder="e.g. DHAKA-METRO-KA-1234">
                </div>
                <div class="form-group">
                    <label>Category</label>
                    <select id="v-type">
                        <option value="AC Ambulance">AC Ambulance</option>
                        <option value="Non-AC Ambulance">Non-AC Ambulance</option>
                        <option value="ICU Support">ICU Support</option>
                    </select>
                </div>
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label>Driver Name</label>
                    <input type="text" id="v-driver" placeholder="Assign driver">
                </div>
                <div class="form-group">
                    <label>Fare (৳)</label>
                    <input type="number" id="v-fare" placeholder="1500">
                </div>
            </div>
            <button class="btn-submit" onclick="addVehicle()">DEPLOY TO FLEET</button>
        </section>

        <h3>Active Inventory</h3>
        <div id="fleet-list"></div>
    </main>

    <script>
        const API_BASE = 'https://med-drive-ambulance-app.onrender.com/api';

        window.onload = () => {
            const user = sessionStorage.getItem('userName');
            if(user) {
                document.getElementById('provider-name').innerText = user;
                document.getElementById('company-display').innerText = user;
            }
            fetchFleet();
        };

        async function fetchFleet() {
            const providerName = sessionStorage.getItem('userName');
            try {
                const response = await fetch(`${API_BASE}/ambulances`);
                const allData = await response.json();
                
                // FILTERING BY userName as requested
                const myFleet = allData.filter(item => item.provider === providerName);

                // Update Stats
                document.getElementById('total-count').innerText = myFleet.length;
                document.getElementById('avail-count').innerText = myFleet.filter(a => a.status === 'Available').length;

                // EARNINGS CALCULATOR
                const totalRevenue = myFleet.reduce((sum, amb) => sum + (parseInt(amb.base_fare) || 0), 0);
                document.getElementById('revenue-count').innerText = `৳ ${totalRevenue.toLocaleString()}`;

                const listDiv = document.getElementById('fleet-list');
                if(myFleet.length === 0) {
                    listDiv.innerHTML = `<p style="text-align:center; color:var(--text-gray); padding:20px;">No vehicles found.</p>`;
                    return;
                }

                listDiv.innerHTML = myFleet.map(amb => `
                    <div class="fleet-item">
                        <div>
                            <div style="font-weight: bold;">${amb.vehicle_number}</div>
                            <small style="color: var(--text-gray);">${amb.ambulance_type} | Driver: ${amb.driver_name}</small>
                        </div>
                        <div style="text-align: right;">
                            <span class="status-badge status-available">${amb.status.toUpperCase()}</span>
                            <div style="margin-top: 5px; font-weight: bold;">৳ ${amb.base_fare || 1500}</div>
                        </div>
                    </div>
                `).join('');

            } catch (err) { console.error("Fetch Error:", err); }
        }

        async function addVehicle() {
            const data = {
                vehicle_number: document.getElementById('v-plate').value,
                ambulance_type: document.getElementById('v-type').value,
                driver_name: document.getElementById('v-driver').value,
                base_fare: document.getElementById('v-fare').value,
                provider: sessionStorage.getItem('userName'),
                status: 'Available'
            };

            if(!data.vehicle_number || !data.driver_name) return alert("Fill all fields.");

            const res = await fetch(`${API_BASE}/ambulances`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data)
            });

            if(res.ok) {
                alert("Registered!");
                fetchFleet();
                document.querySelectorAll('input').forEach(i => i.value = '');
            }
        }

        function logout() { sessionStorage.clear(); window.location.href = '../index.html'; }
    </script>
</body>
</html>
